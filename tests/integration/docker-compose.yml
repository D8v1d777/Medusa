version: '3.8'

services:
  # Damn Vulnerable Web Application (DVWA)
  dvwa:
    image: vulnerables/web-dvwa
    ports:
      - "8081:80"
    environment:
      - DBMS_TYPE=MYSQL
    networks:
      - pentkit-net

  # ModSecurity WAF with OWASP Core Rule Set
  waf:
    image: owasp/modsecurity-crs:apache
    ports:
      - "8082:80"
    environment:
      - PARAMS=--debug
      - BACKEND=http://dvwa:80
      - PROXY=1
    depends_on:
      - dvwa
    networks:
      - pentkit-net

  # Neo4j for BloodHound integration testing
  neo4j:
    image: neo4j:4.4
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/pentkit_test_pass
    networks:
      - pentkit-net

networks:
  pentkit-net:
    driver: bridge
