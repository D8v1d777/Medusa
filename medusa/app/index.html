<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>Medusa</title>
  <script>
    (function(){
      var m = location.search.match(/apiUrl=([^&]+)/);
      if (m) window.MEDUSA_API_URL = decodeURIComponent(m[1]);
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script src="dist/renderer/index.js"></script>
</body>
</html>
