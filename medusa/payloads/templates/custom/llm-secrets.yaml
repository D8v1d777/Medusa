id: medusa-llm-key-leak
info:
  name: Medusa LLM API Key Leak
  author: medusa-team
  severity: critical
  description: Detects OpenAI, Anthropic, or Pinecone keys in front-end JS or static files.
  tags: medusa,ai,secrets,openai,anthropic

requests:
  - method: GET
    path:
      - "{{BaseURL}}/js/app.js"
      - "{{BaseURL}}/static/bundle.js"
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/_next/static/chunks/main.js"
    
    matchers-condition: or
    matchers:
      - type: regex
        name: openai-key
        regex:
          - "sk-[a-zA-Z0-9]{48}"
        part: body
      
      - type: regex
        name: anthropic-key
        regex:
          - "sk-ant-[a-z0-9]{5,}"
        part: body
      
      - type: regex
        name: pinecone-key
        regex:
          - "[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}"
        part: body
        description: Pinecone is common in AI vector storage.
